# GitHub Actionsのデプロイ指示書
name: Deploy static content to Pages

on:
  push:
    branches: ["master"] # masterブランチにpushされた時に動く

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build # ここでdistフォルダを作る
        run: |
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact # distフォルダを公開対象にする
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # ←ここが重要！distを指定

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4